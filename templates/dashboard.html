<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h1>Prediction Dashboard</h1>

    <div class="stats-box">
        <div class="stat-card fake-card">
            <h2>{{ fake_count }}</h2>
            <p>Fake News</p>
        </div>

        <div class="stat-card real-card">
            <h2>{{ real_count }}</h2>
            <p>Real News</p>
        </div>
    </div>

    <div class="chart-box">
        <img src="{{ url_for('static', filename='chart.png') }}" alt="Chart">
    </div>

    <br>

    <a href="/">
        <button>Back Home</button>
    </a>
</div>

</body>
</html>
