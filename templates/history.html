<!DOCTYPE html>
<html>
<head>
    <title>Prediction History</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h1>Prediction History</h1>

    <table class="history-table">
        <tr>
            <th>ID</th>
            <th>News Preview</th>
            <th>Result</th>
            <th>Confidence</th>
        </tr>

        {% for record in records %}
        <tr>
            <td>{{ record[0] }}</td>
            <td>{{ record[1][:120] }}...</td>
            <td class="{{ 'real' if record[2] == 'Real News' else 'fake' }}">
                {{ record[2] }}
            </td>
            <td>{{ record[3] }}%</td>
        </tr>
        {% endfor %}
    </table>

    <br><br>

    <a href="/">
        <button>Back Home</button>
    </a>
</div>

</body>
</html>
